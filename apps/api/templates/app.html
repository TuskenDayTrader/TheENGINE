<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheENGINE — Confluence Analyzer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>TheENGINE</h1>
    <p>2+2+2+2 Confluence Scoring — Upload a chart screenshot to get started.</p>
  </header>

  <div class="card">
    <form id="analyze-form" novalidate>

      <div class="field">
        <label for="file">Chart Screenshot <span style="color:#c00">*</span></label>
        <input id="file" name="file" type="file" accept="image/png,image/jpeg,image/jpg,image/webp" required />
        <span class="hint">PNG, JPG or WebP</span>
      </div>

      <div class="field">
        <label for="ticker">Ticker <span style="color:#c00">*</span></label>
        <input id="ticker" name="ticker" type="text" placeholder="e.g. NQ, ES" required />
      </div>

      <div class="field">
        <label for="timeframe">Timeframe <span style="color:#c00">*</span></label>
        <select id="timeframe" name="timeframe" required>
          <option value="30m">30 minutes</option>
          <option value="1h">1 hour</option>
        </select>
      </div>

      <div class="field">
        <label for="lookback_days">Lookback Days</label>
        <input id="lookback_days" name="lookback_days" type="number" min="1" value="5" />
        <span class="hint">Number of prior sessions to consider (default: 5)</span>
      </div>

      <div class="field">
        <label for="date_et">Date (ET) — optional</label>
        <input id="date_et" name="date_et" type="date" />
        <span class="hint">Leave blank to use today's date</span>
      </div>

      <button type="submit" id="submit-btn">Analyze</button>
    </form>

    <div id="status-banner" role="status"></div>

    <div class="result-card" id="result-card">
      <h2>Analysis Result</h2>
      <div id="result-rows"></div>
      <pre class="poster-text" id="poster-text" style="display:none"></pre>
      <p class="fallback-msg" id="fallback-msg" style="display:none"></p>
    </div>
  </div>

  <script>
    const form      = document.getElementById('analyze-form');
    const submitBtn = document.getElementById('submit-btn');
    const banner    = document.getElementById('status-banner');
    const resultCard = document.getElementById('result-card');
    const resultRows = document.getElementById('result-rows');
    const posterEl  = document.getElementById('poster-text');
    const fallbackEl = document.getElementById('fallback-msg');

    function showBanner(msg, type) {
      banner.textContent = msg;
      banner.className = type;
      banner.style.display = 'block';
    }

    function resetResult() {
      resultCard.style.display = 'none';
      resultRows.innerHTML = '';
      posterEl.style.display = 'none';
      posterEl.textContent = '';
      fallbackEl.style.display = 'none';
      fallbackEl.textContent = '';
    }

    function addRow(key, value) {
      const div = document.createElement('div');
      div.className = 'result-row';
      div.innerHTML = `<span class="key">${key}</span><span class="value">${value}</span>`;
      resultRows.appendChild(div);
    }

    function showResult(analysis) {
      resultCard.style.display = 'block';
      resultRows.innerHTML = '';
      if (analysis.action_state) addRow('Action State', analysis.action_state);
      if (typeof analysis.confidence === 'number') {
        addRow('Confidence', (analysis.confidence * 100).toFixed(0) + '%');
      }
      if (analysis.strongest_resistance && analysis.strongest_resistance.length) {
        const r = analysis.strongest_resistance[0];
        addRow('Strongest Resistance', r.price.toFixed(2) + ' (' + r.label + ')');
      }
      if (analysis.weakest_resistance && analysis.weakest_resistance.length) {
        const r = analysis.weakest_resistance[0];
        addRow('Weakest Resistance', r.price.toFixed(2) + ' (' + r.label + ')');
      }
      if (analysis.strongest_support && analysis.strongest_support.length) {
        const s = analysis.strongest_support[0];
        addRow('Strongest Support', s.price.toFixed(2) + ' (' + s.label + ')');
      }
      if (analysis.weakest_support && analysis.weakest_support.length) {
        const s = analysis.weakest_support[0];
        addRow('Weakest Support', s.price.toFixed(2) + ' (' + s.label + ')');
      }
      if (analysis.poster_text) {
        posterEl.textContent = analysis.poster_text;
        posterEl.style.display = 'block';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetResult();

      const fileInput = document.getElementById('file');
      const ticker    = document.getElementById('ticker').value.trim();
      const timeframe = document.getElementById('timeframe').value;
      const lookback  = document.getElementById('lookback_days').value || '5';
      const dateEt    = document.getElementById('date_et').value;

      if (!fileInput.files.length) {
        showBanner('Please select a chart screenshot.', 'error');
        return;
      }
      if (!ticker) {
        showBanner('Ticker is required.', 'error');
        return;
      }

      submitBtn.disabled = true;
      showBanner('Uploading and analyzing screenshot…', 'info');

      const fd = new FormData();
      fd.append('file', fileInput.files[0]);
      fd.append('ticker', ticker);
      fd.append('timeframe', timeframe);
      fd.append('lookback_days', lookback);
      if (dateEt) fd.append('date_et', dateEt);

      try {
        const res  = await fetch('/analyze-image', { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showBanner('Upload failed: ' + (data.detail || res.statusText), 'error');
          return;
        }

        if (data.analysis) {
          // Full extraction succeeded — show result card
          const pct = typeof data.extraction_confidence === 'number'
            ? ' (confidence ' + (data.extraction_confidence * 100).toFixed(0) + '%)'
            : '';
          if (data.extraction_warning) {
            showBanner('⚠️ Partial result — low confidence' + pct + ': ' + data.extraction_warning, 'warning');
          } else {
            showBanner('Analysis complete' + pct + '.', 'ok');
          }
          showResult(data.analysis);
        } else {
          // Extraction did not produce usable levels
          if (data.extraction_warning) {
            showBanner('⚠️ ' + data.extraction_warning, 'warning');
          } else {
            showBanner('Screenshot received; level extraction not available for this image.', 'ok');
          }
          resultCard.style.display = 'block';
          fallbackEl.textContent = data.extraction_warning
            ? 'Partial analysis only: ' + data.extraction_warning +
              ' To run a full analysis, supply trading levels via the /analyze API.'
            : 'Screenshot intake complete; level extraction not enabled for this image type. ' +
              'To run a full confluence analysis, supply trading levels via the /analyze API.';
          fallbackEl.style.display = 'block';
        }
      } catch (err) {
        showBanner('Network error: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
